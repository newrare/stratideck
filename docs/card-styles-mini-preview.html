<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card Mini Styles — Stratideck</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0e14;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 50px 20px;
      gap: 40px;
    }

    h1 {
      font-size: 1.1rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #94a3b8;
      text-shadow: 0 0 20px rgba(148,163,184,0.2);
    }

    .showcase {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    /* ──────────────────────────────────────────
       CARD WRAPPER
    ────────────────────────────────────────── */
    .card-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.22s ease;
    }

    .card-wrap:hover {
      transform: translateY(-5px);
    }

    /* ──────────────────────────────────────────
       MINI CARD  –  square
    ────────────────────────────────────────── */
    .card {
      position: relative;
      width: 110px;
      height: 110px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px var(--glow-border),
        0 6px 16px var(--glow-mid),
        0 14px 36px var(--glow-deep);
      cursor: pointer;
      transition: box-shadow 0.22s ease;
    }

    .card-wrap:hover .card {
      box-shadow:
        0 0 0 1px var(--glow-border-h),
        0 10px 24px var(--glow-mid-h),
        0 22px 48px var(--glow-deep-h);
    }

    /* ── Border-top accent line ── */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--primary-dark), var(--primary-light), var(--primary-dark));
      z-index: 10;
    }

    /* ── Full bleed background image ── */
    .card .bg-img {
      position: absolute;
      inset: 0;
      background: url('https://i.pinimg.com/originals/22/29/08/22290829b4f7a451f545685327d43a11.jpg')
        center / cover no-repeat;
    }

    /* ── Tinted gradient overlay ── */
    .card .overlay {
      position: absolute;
      inset: 0;
      background: var(--overlay);
    }

    /* ── Large type number (top-right, decorative, slightly cropped) ── */
    .card .type-num {
      position: absolute;
      top: 2px;
      right: -8px;
      font-size: 4.8rem;
      font-weight: 900;
      line-height: 1;
      color: var(--primary);
      opacity: 0.16;
      pointer-events: none;
      user-select: none;
      z-index: 2;
    }

    /* ── Content sits at the bottom ── */
    .card .content {
      position: relative;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 8px 8px;
      z-index: 5;
    }

    /* ── Label: Type | Rank ── */
    .card .label {
      font-size: 0.55rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Footer · 3 small ability slots ── */
    .card .footer {
      display: flex;
      justify-content: space-between;
      gap: 4px;
    }

    .card .slot {
      flex: 1;
      height: 16px;
      border-radius: 4px;
      background: var(--slot-bg);
      border: 1px solid var(--slot-border);
    }


    h2 {
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #64748b;
    }

    /* ──────────────────────────────────────────
       TINY CARD  –  half-size (~55px square)
    ────────────────────────────────────────── */
    .card-tiny {
      width: 55px;
      height: 55px;
      border-radius: 8px;
    }

    .card-tiny .type-num {
      font-size: 3.4rem;
      right: -4px;
      opacity: 0.3;
    }

    .card-tiny .content {
      padding: 0 5px 5px;
    }

    .card-tiny .label {
      font-size: 0.58rem;
      margin-bottom: 0;
    }

    /* ──────────────────────────────────────────
       MYSTERY TINY  –  animated rainbow
    ────────────────────────────────────────── */
    @keyframes hue-cycle {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes glow-cycle {
      0%   { box-shadow: 0 0 0 1px rgba(124,58,237,0.5), 0 6px 18px rgba(124,58,237,0.4); }
      16%  { box-shadow: 0 0 0 1px rgba(14,165,233,0.5), 0 6px 18px rgba(14,165,233,0.4); }
      33%  { box-shadow: 0 0 0 1px rgba(34,197,94,0.5),  0 6px 18px rgba(34,197,94,0.4); }
      50%  { box-shadow: 0 0 0 1px rgba(234,179,8,0.5),  0 6px 18px rgba(234,179,8,0.4); }
      66%  { box-shadow: 0 0 0 1px rgba(239,68,68,0.5),  0 6px 18px rgba(239,68,68,0.4); }
      83%  { box-shadow: 0 0 0 1px rgba(249,115,22,0.5), 0 6px 18px rgba(249,115,22,0.4); }
      100% { box-shadow: 0 0 0 1px rgba(124,58,237,0.5), 0 6px 18px rgba(124,58,237,0.4); }
    }

    .card-mystery {
      animation: glow-cycle 5s linear infinite;
    }

    .card-mystery::before {
      background: linear-gradient(90deg,
        #7c3aed, #1d4ed8, #0ea5e9, #15803d, #22c55e,
        #ef4444, #f97316, #eab308, #b45309, #475569, #7c3aed
      );
      background-size: 300% 100%;
      animation: hue-cycle 5s linear infinite;
    }

    .card-mystery .bg-img-mystery {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg,
        #0d0020, #001030, #002010, #201000, #200000,
        #001030, #0d0020
      );
      background-size: 400% 400%;
      animation: hue-cycle 5s linear infinite;
    }

    .card-mystery .type-num-mystery {
      position: absolute;
      top: 2px;
      right: -4px;
      font-size: 3.4rem;
      font-weight: 900;
      line-height: 1;
      opacity: 0.55;
      pointer-events: none;
      user-select: none;
      z-index: 2;
      background: linear-gradient(90deg,
        #c4b5fd, #93c5fd, #bae6fd, #86efac, #fef08a,
        #fecaca, #fdba74, #fef08a, #c4b5fd
      );
      background-size: 300% 100%;
      animation: hue-cycle 5s linear infinite;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .card-mystery .label-mystery {
      font-size: 0.58rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      background: linear-gradient(90deg,
        #c4b5fd, #bae6fd, #86efac, #fef08a, #fecaca, #fdba74, #c4b5fd
      );
      background-size: 300% 100%;
      animation: hue-cycle 5s linear infinite;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ──────────────────────────────────────────
       GREY MYSTERY TINY  –  static greyscale
    ────────────────────────────────────────── */
    .card-mystery-grey::before {
      background: linear-gradient(90deg, #1e293b, #94a3b8, #1e293b);
    }

    .card-mystery-grey {
      box-shadow:
        0 0 0 1px rgba(148, 163, 184, 0.30),
        0 6px 16px rgba(100, 116, 139, 0.25),
        0 14px 36px rgba(30, 41, 59, 0.40);
    }

    .card-mystery-grey .bg-img-grey {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 40%, #334155 70%, #0f172a 100%);
    }

    .card-mystery-grey .type-num-grey {
      position: absolute;
      top: 2px;
      right: -4px;
      font-size: 3.4rem;
      font-weight: 900;
      line-height: 1;
      opacity: 0.45;
      pointer-events: none;
      user-select: none;
      z-index: 2;
      background: linear-gradient(180deg, #cbd5e1, #475569);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .card-mystery-grey .label-grey {
      font-size: 0.58rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      background: linear-gradient(90deg, #94a3b8, #e2e8f0, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
